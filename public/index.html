<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDM KW ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface: #121212;
            --surface-light: #1e1e1e;
            --primary: #FFD700;
            --primary-glow: rgba(255, 215, 0, 0.4);
            --text: #f3f4f6;
            --text-dim: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 0%, var(--surface-light) 0%, var(--bg-color) 70%);
            color: var(--text); 
            font-family: 'Poppins', sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { 
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.05); 
            width: 100%;
            max-width: 600px; 
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: scanline 2s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        h1 { 
            color: var(--primary); 
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group { 
            margin-bottom: 25px; 
            display: flex; 
            gap: 12px; 
            flex-direction: column;
        }

        @media (min-width: 480px) {
            .input-group { flex-direction: row; }
        }

        input { 
            flex: 1; 
            padding: 16px 20px; 
            border-radius: 12px; 
            border: 1px solid var(--surface-light); 
            background: rgba(0, 0, 0, 0.5); 
            color: var(--text); 
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        button.hajar { 
            background: var(--primary); 
            color: var(--bg-color); 
            font-weight: 800; 
            font-size: 1rem;
            border: none; 
            padding: 16px 32px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        button.hajar:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
            background: #ffea00;
        }

        button.hajar:active {
            transform: translateY(1px);
        }

        .mode-selector { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 30px; 
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid var(--surface-light);
        }

        .mode-btn { 
            flex: 1;
            padding: 12px 15px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
            background: transparent; 
            color: var(--text-dim); 
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        .mode-btn.active { 
            background: var(--primary); 
            color: var(--bg-color); 
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .status-box { 
            text-align: left; 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid var(--surface-light);
            padding: 20px; 
            border-radius: 16px; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.85rem; 
            margin-bottom: 25px;
            color: #d1d5db;
        }

        .status-box div {
            margin-bottom: 8px;
        }
        .status-box div:last-child {
            margin-bottom: 0;
        }

        .status-box strong {
            color: var(--primary);
            margin-right: 5px;
        }

        .progress-container { 
            width: 100%; 
            background-color: rgba(0, 0, 0, 0.5); 
            border-radius: 100px; 
            overflow: hidden; 
            height: 12px; 
            border: 1px solid var(--surface-light);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            position: relative;
        }

        .progress-bar { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, #d4af37, var(--primary)); 
            border-radius: 100px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--primary-glow);
            position: relative;
        }

        .progress-bar::after {
            content: "";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        #percent-text { 
            font-weight: 800; 
            margin-top: 15px; 
            display: inline-block; 
            color: var(--primary); 
            font-size: 1.5rem; 
            text-shadow: 0 0 15px var(--primary-glow);
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚡ IDM KW ULTIMATE</h1>
        <div class="subtitle">Multi-Threaded YouTube & TikTok Downloader</div>
        
        <div class="input-group">
            <input type="text" id="manual-url" placeholder="Paste link YouTube / TikTok di sini..." autocomplete="off">
            <button class="hajar" onclick="hajarManual()">SEDOT!</button>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" id="btn-auto" onclick="setMode('auto')">Auto Mode</button>
            <button class="mode-btn" id="btn-video" onclick="setMode('video')">Video (MP4)</button>
            <button class="mode-btn" id="btn-mp3" onclick="setMode('mp3')">Music (MP3)</button>
            <button class="mode-btn" id="btn-ig" onclick="setMode('ig')">Instagram</button>
        </div>

        <div class="status-box">
            <div><strong>[URL]</strong> <span id="link-display">Menunggu link...</span></div>
            <div><strong>[SYS]</strong> <span id="status">Standby. Siap dieksekusi.</span></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <span id="percent-text">0%</span>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentMode = 'auto';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            socket.emit('changeMode', mode);
        }

        function hajarManual() {
            const url = document.getElementById('manual-url').value;
            if (url) {
                socket.emit('manualDownload', url);
                document.getElementById('manual-url').value = '';
            }
        }

        document.getElementById('manual-url').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                hajarManual();
            }
        });

        socket.on('target-locked', (data) => {
            const displayUrl = data.url.length > 50 ? data.url.substring(0, 47) + '...' : data.url;
            document.getElementById('link-display').innerText = displayUrl;
            document.getElementById('status').innerText = "Memilih folder tujuan...";
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('percent-text').innerText = '0%';
        });

        socket.on('status', (data) => { document.getElementById('status').innerText = data.msg; });
        
        socket.on('progress', (data) => {
            let pct = data.percent;
            if (!isNaN(parseFloat(pct))) {
                document.getElementById('progress-bar').style.width = pct + '%';
                document.getElementById('percent-text').innerText = pct + '%';
            } else {
                document.getElementById('progress-bar').style.width = '100%';
                document.getElementById('percent-text').innerText = pct;
            }
        });
        
        socket.on('done', () => { 
            document.getElementById('status').innerText = "DOWNLOAD SELESAI! ✅ Cek folder anda!"; 
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('percent-text').innerText = '100%';
            
            // Success animation
            document.getElementById('percent-text').style.color = '#4ade80';
            setTimeout(() => {
                document.getElementById('percent-text').style.color = 'var(--primary)';
            }, 2000);
        });
    </script>
</body>
</html>
