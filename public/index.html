<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDM KW ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --surface: #242424;
            --surface-border: #333333;
            --primary: #FFD700;
            --primary-glow: rgba(255, 215, 0, 0.4);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: var(--font-main); 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { 
            background: var(--surface);
            border: 1px solid var(--surface-border);
            padding: 40px 45px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            width: 100%;
            max-width: 580px; 
            text-align: center;
        }

        h1 { 
            color: var(--text-main); 
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
            font-weight: 400;
            margin-bottom: 35px;
        }

        .input-group { 
            margin-bottom: 25px; 
            display: flex; 
            gap: 12px; 
            flex-direction: column;
        }

        @media (min-width: 480px) {
            .input-group { flex-direction: row; }
        }

        input { 
            flex: 1; 
            padding: 14px 18px; 
            border-radius: 10px; 
            border: 1px solid var(--surface-border); 
            background: rgba(0,0,0,0.15); 
            color: var(--text-main); 
            font-family: var(--font-main);
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input::placeholder {
            color: #6b7280;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0,0,0,0.25);
        }

        button.hajar { 
            background: var(--text-main); 
            color: var(--bg-color); 
            font-weight: 600; 
            font-size: 1rem;
            border: none; 
            padding: 14px 28px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }

        button.hajar:hover {
            background: var(--primary);
            transform: translateY(-1px);
        }

        button.hajar:active {
            transform: translateY(0);
        }

        /* --- Tampilan Lama Mode Selector Sesuai Request --- */
        .mode-selector { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 35px; 
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid var(--surface-border);
        }

        .mode-btn { 
            flex: 1;
            padding: 12px 15px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
            background: transparent; 
            color: var(--text-dim); 
            font-family: var(--font-main);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .mode-btn.active { 
            background: var(--primary); 
            color: var(--bg-color); 
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        /* --------------------------------------------------- */

        .status-box { 
            text-align: left; 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--surface-border);
            padding: 18px 20px; 
            border-radius: 12px; 
            font-family: var(--font-mono); 
            font-size: 0.85rem; 
            margin-bottom: 25px;
            color: #d1d5db;
        }

        .status-box div {
            margin-bottom: 6px;
            line-height: 1.5;
        }
        .status-box div:last-child {
            margin-bottom: 0;
        }

        .status-box strong {
            color: var(--primary);
            margin-right: 6px;
            font-weight: normal;
        }

        .progress-container { 
            width: 100%; 
            background-color: rgba(0,0,0,0.3); 
            border-radius: 8px; 
            overflow: hidden; 
            height: 6px; 
            border: 1px solid var(--surface-border);
        }

        .progress-bar { 
            width: 0%; 
            height: 100%; 
            background: var(--primary); 
            border-radius: 8px;
            transition: width 0.3s ease;
        }

        #percent-text { 
            font-weight: 600; 
            margin-top: 15px; 
            display: inline-block; 
            color: var(--text-main); 
            font-size: 1.25rem; 
            font-family: var(--font-mono);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚡ IDM KW ULTIMATE</h1>
        <div class="subtitle">Multi-Threaded YouTube & TikTok Downloader</div>
        
        <div class="input-group">
            <input type="text" id="manual-url" placeholder="Paste link YouTube / TikTok di sini..." autocomplete="off">
            <button class="hajar" onclick="hajarManual()">SEDOT!</button>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" id="btn-auto" onclick="setMode('auto')">Auto Mode</button>
            <button class="mode-btn" id="btn-video" onclick="setMode('video')">Video (MP4)</button>
            <button class="mode-btn" id="btn-mp3" onclick="setMode('mp3')">Music (MP3)</button>
        </div>

        <div class="status-box">
            <div><strong>[URL]</strong> <span id="link-display">Menunggu link...</span></div>
            <div><strong>[SYS]</strong> <span id="status">Standby. Siap dieksekusi.</span></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <span id="percent-text">0%</span>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentMode = 'auto';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            socket.emit('changeMode', mode);
        }

        function hajarManual() {
            const url = document.getElementById('manual-url').value;
            if (url) {
                socket.emit('manualDownload', url);
                document.getElementById('manual-url').value = '';
            }
        }

        document.getElementById('manual-url').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                hajarManual();
            }
        });

        socket.on('target-locked', (data) => {
            const displayUrl = data.url.length > 50 ? data.url.substring(0, 47) + '...' : data.url;
            document.getElementById('link-display').innerText = displayUrl;
            document.getElementById('status').innerText = "Memilih folder tujuan...";
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('percent-text').innerText = '0%';
        });

        socket.on('status', (data) => { document.getElementById('status').innerText = data.msg; });
        
        socket.on('progress', (data) => {
            let pct = data.percent;
            if (!isNaN(parseFloat(pct))) {
                document.getElementById('progress-bar').style.width = pct + '%';
                document.getElementById('percent-text').innerText = pct + '%';
            } else {
                document.getElementById('progress-bar').style.width = '100%';
                document.getElementById('percent-text').innerText = pct;
            }
        });
        
        socket.on('done', () => { 
            document.getElementById('status').innerText = "DOWNLOAD SELESAI! ✅ Cek folder anda!"; 
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('percent-text').innerText = '100%';
            
            // Success animation
            document.getElementById('percent-text').style.color = '#4ade80';
            setTimeout(() => {
                document.getElementById('percent-text').style.color = 'var(--text-main)';
            }, 2000);
        });
    </script>
</body>
</html>
